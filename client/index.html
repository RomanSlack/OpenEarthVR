<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Earth Explorer</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }

      #app {
        width: 100vw;
        height: 100vh;
        cursor: grab;
      }
      #app.grabbing { cursor: grabbing; }

      /* ── Loading overlay ── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: radial-gradient(ellipse at 50% 40%, #0a1628 0%, #000812 100%);
        z-index: 10;
        transition: opacity 0.6s ease;
      }
      #loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loading-globe {
        width: 72px;
        height: 72px;
        animation: spin 3s linear infinite;
        filter: drop-shadow(0 0 18px rgba(64, 148, 255, 0.7));
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      .loading-title {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #e8f0fe;
        text-transform: uppercase;
      }

      .loading-status {
        font-size: 0.82rem;
        color: rgba(180, 210, 255, 0.7);
        letter-spacing: 0.03em;
        min-height: 1.2em;
        text-align: center;
        transition: opacity 0.2s;
      }

      .loading-bar-track {
        width: 220px;
        height: 3px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4094ff, #60d0ff);
        border-radius: 2px;
        transition: width 0.25s ease;
      }

      /* ── Error state ── */
      #loading.error {
        background: radial-gradient(ellipse at 50% 40%, #1a0808 0%, #000 100%);
      }
      #loading.error .loading-globe {
        filter: drop-shadow(0 0 18px rgba(255, 80, 80, 0.7)) grayscale(0.4);
      }
      #loading.error .loading-status {
        color: #ff8080;
        font-size: 0.88rem;
        max-width: 320px;
        line-height: 1.5;
      }

      /* ── Copyright badge ── */
      #copyright {
        position: fixed;
        bottom: 10px;
        right: 12px;
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.72rem;
        letter-spacing: 0.01em;
        z-index: 5;
        display: none;
        background: rgba(0, 0, 0, 0.35);
        padding: 3px 8px;
        border-radius: 4px;
        backdrop-filter: blur(4px);
      }

      /* ── Hint overlay (desktop) ── */
      #hint {
        position: fixed;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.78rem;
        letter-spacing: 0.04em;
        z-index: 5;
        display: none;
        pointer-events: none;
        animation: hint-fade 4s ease forwards;
      }
      @keyframes hint-fade {
        0%   { opacity: 0; transform: translateX(-50%) translateY(4px); }
        15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
        70%  { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Override Three.js VRButton default position/style */
      #VRButton {
        bottom: 20px !important;
        right: unset !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        border: 1px solid rgba(255,255,255,0.3) !important;
        background: rgba(0, 0, 0, 0.6) !important;
        backdrop-filter: blur(8px) !important;
        font-family: inherit !important;
        letter-spacing: 0.06em !important;
        font-size: 0.8rem !important;
        padding: 10px 24px !important;
        border-radius: 24px !important;
        transition: background 0.2s, border-color 0.2s !important;
      }
      #VRButton:hover {
        background: rgba(64, 148, 255, 0.25) !important;
        border-color: rgba(64, 148, 255, 0.7) !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="loading">
      <svg class="loading-globe" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="30" stroke="rgba(64,148,255,0.25)" stroke-width="2"/>
        <circle cx="36" cy="36" r="30" stroke="url(#g1)" stroke-width="2"
                stroke-dasharray="120 70" stroke-linecap="round"/>
        <ellipse cx="36" cy="36" rx="15" ry="30" stroke="rgba(96,208,255,0.5)" stroke-width="1.5"
                 stroke-dasharray="8 5" stroke-linecap="round"/>
        <line x1="6" y1="36" x2="66" y2="36" stroke="rgba(64,148,255,0.3)" stroke-width="1.5"/>
        <circle cx="36" cy="36" r="3" fill="#4094ff" filter="url(#glow)"/>
        <defs>
          <linearGradient id="g1" x1="6" y1="6" x2="66" y2="66" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4094ff"/>
            <stop offset="100%" stop-color="#60d0ff"/>
          </linearGradient>
          <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>

      <div class="loading-title">VR Earth Explorer</div>
      <div class="loading-bar-track"><div class="loading-bar-fill" id="progress-bar"></div></div>
      <div class="loading-status" id="loading-status">Initializing…</div>
    </div>

    <div id="copyright"></div>
    <div id="hint">Drag to look around · Click "Enter VR" for immersive mode</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
